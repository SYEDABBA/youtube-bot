name: AI YouTube Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * *"   # Roz 7:30 PM India (approx)

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # 📥 Repo clone
      - name: Checkout code
        uses: actions/checkout@v4

      # 🐍 Python setup
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # 📦 Install all libraries
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install gtts moviepy requests google-api-python-client google-auth google-auth-oauthlib

      # 🤖 Run AI Bot
      - name: Run bot
        run: python main.py
        env:
          TOKEN_JSON: ${{ secrets.TOKEN_JSON }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

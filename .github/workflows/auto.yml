name: YouTube Bot

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y ffmpeg

      - name: Install Python libs
        run: |
          pip install gTTS moviepy pillow

      - name: Run bot
        run: python main.py

name: AI-YouTube-Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"   # daily 8:30 AM IST (adjust kar sakta hai)

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      # ==============================
      # CHECKOUT CODE
      # ==============================
      - name: Checkout repo
        uses: actions/checkout@v4

      # ==============================
      # SETUP PYTHON
      # ==============================
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # ==============================
      # INSTALL SYSTEM DEPENDENCIES
      # ==============================
      - name: Install ffmpeg + ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick

      # ==============================
      # FIX IMAGEMAGICK POLICY (IMPORTANT)
      # ==============================
      - name: Fix ImageMagick policy
        run: |
          sudo sed -i 's/none/read,write/g' /etc/ImageMagick-6/policy.xml || true

      # ==============================
      # INSTALL PYTHON LIBS
      # ==============================
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ==============================
      # RUN BOT
      # ==============================
      - name: Run AI Bot
        env:
          TOKEN_JSON: ${{ secrets.TOKEN_JSON }}
        run: python main.py

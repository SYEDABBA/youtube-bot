name: YouTube Bot

on:
  schedule:
    - cron: '30 2 * * *'  # 8 AM India
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install libs
        run: |
          pip install gTTS moviepy google-api-python-client

      - name: Run main
        run: python main.py

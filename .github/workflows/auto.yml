name: YouTube Bot

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y ffmpeg

      - name: Install Python libs
        run: |
          python -m pip install --upgrade pip
          pip install moviepy==1.0.3 gtts

      - name: Run bot
        run: python main.py
